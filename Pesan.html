<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kontak Tuying - Dark Glassmorphism + Mobile FAB</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle animated soft light background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(100, 200, 255, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(200, 100, 255, 0.06) 0%, transparent 50%);
      animation: subtlePulse 15s infinite alternate ease-in-out;
      pointer-events: none;
      z-index: -2;
    }

    @keyframes subtlePulse {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0.9; transform: scale(1.05); }
    }

    /* Modal Overlay & Content (hidden default) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      position: relative;
      max-width: 90%;
      width: 520px;
      padding: 40px 30px;
      background: rgba(20, 20, 50, 0.35);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6),
                  inset 0 0 20px rgba(100, 150, 255, 0.1);
      transform: scale(0.8);
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .close-btn-ct {
      position: absolute;
      top: 15px;
      right: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .close-btn-ct:hover {
      background: rgba(255, 100, 100, 0.5);
    }

    h2 {
      text-align: center;
      color: #f0f4ff;
      margin-bottom: 35px;
      font-size: 2.2rem;
      text-shadow: 0 0 15px rgba(100, 150, 255, 0.4);
    }

    label { display: block; margin: 20px 0 10px; font-weight: 600; color: #c0d0ff; }
    input, textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 25px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: rgba(100, 200, 255, 0.5);
      box-shadow: 0 0 15px rgba(100, 200, 255, 0.3);
    }

    button[type="submit"] {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      padding: 15px;
      border: none;
      width: 100%;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
      transition: all 0.4s;
      box-shadow: 0 8px 25px rgba(37, 117, 252, 0.4);
    }
    button[type="submit"]:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(37, 117, 252, 0.6);
      background: linear-gradient(135deg, #2575fc, #6a11cb);
    }

    #status { text-align: center; margin-top: 25px; font-weight: bold; font-size: 1.1rem; }
    .success { color: #00ff9d; text-shadow: 0 0 10px #00ff9d; }
    .error { color: #ff6b6b; text-shadow: 0 0 10px #ff6b6b; }

    /* Floating Action Button (FAB) - Mobile Only */
    .fab {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 65px;
      height: 65px;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(37, 117, 252, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 9998;
      transition: all 0.3s ease;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .fab:hover {
      transform: scale(1.1) translateY(-5px);
      box-shadow: 0 15px 40px rgba(37, 117, 252, 0.7);
    }

    .fab svg { width: 30px; height: 30px; fill: white; }

    /* Hide FAB on desktop/large screens */
    @media (min-width: 769px) {
      .fab { display: none; }
    }

    /* Optional: Hide main container on mobile if you want only modal */
    /* .container { display: none; } @media (min-width: 769px) { .container { display: block; } } */
  </style>
</head>
<body>

<!-- Floating Action Button (Mobile Only) -->
<div class="fab" id="fab-toggle">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
</div>

<!-- Modal Overlay -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <button class="close-btn-ct" id="close-modal">&times;</button>
    
    
    <form id="contact-form">
      <label for="name">Nama Lengkap:</label>
      <input type="text" id="name" name="name" required placeholder="Masukin nama kamu ya..."/>
      
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required placeholder="contoh@email.com"/>
      
      <label for="message">Pesan Kamu:</label>
      <textarea id="message" name="message" rows="6" required placeholder="Ceritain apa yang mau disampein..."></textarea>
      
      <button type="submit">Kirim Pesan Sekarang</button>
    </form>
    
    <div id="status"></div>
  </div>
</div>

<!-- EmailJS SDK -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="text/javascript">
  emailjs.init("WZx3cqRVdxxCiTlbK");

  // Toggle Modal
  const fab = document.getElementById('fab-toggle');
  const modal = document.getElementById('modal');
  const closeModal = document.getElementById('close-modal');

  fab.addEventListener('click', () => {
    modal.classList.add('active');
  });

  closeModal.addEventListener('click', () => {
    modal.classList.remove('active');
  });

  // Close modal when clicking outside content
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.classList.remove('active');
    }
  });

  // Form Submit (sama seperti sebelumnya)
  document.getElementById('contact-form').addEventListener('submit', function(event) {
    event.preventDefault();

    const status = document.getElementById('status');
    status.textContent = "Lagi di kirim... sabar ya kak 😊";
    status.className = "";

    const SERVICE_ID   = "service_8d1gins";
    const TEMPLATE_ID  = "template_q5kj27p";

    emailjs.sendForm(SERVICE_ID, TEMPLATE_ID, this)
      .then(function() {
        status.textContent = "Pesan terkirim! 💕";
        status.className = "success";
        document.getElementById('contact-form').reset();
        setTimeout(() => modal.classList.remove('active'), 2000); 
      }, function(error) {
        status.textContent = "Waduh gagal nih: " + (error.text || "Cek koneksi atau ID-nya ya");
        status.className = "error";
        console.error("EmailJS error:", error);
      });
  });
</script>

</body>
</html>
